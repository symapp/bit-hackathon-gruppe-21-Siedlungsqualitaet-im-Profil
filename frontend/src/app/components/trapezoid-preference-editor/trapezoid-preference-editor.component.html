<div class="trapezoid-editor" [class.disabled]="disabled()">
  <svg
    #svgRoot
    class="trapezoid-svg"
    [attr.viewBox]="'0 0 ' + viewWidth + ' ' + viewHeight"
    role="img"
    aria-label="Bewertungsfunktion"
    (pointermove)="onPointerMove($event)"
    (pointerup)="onPointerUp($event)"
    (pointercancel)="onPointerUp($event)"
  >
    <line
      [attr.x1]="PAD.left"
      [attr.y1]="viewHeight - PAD.bottom"
      [attr.x2]="viewWidth - PAD.right"
      [attr.y2]="viewHeight - PAD.bottom"
      class="axis"
    />
    @for (tick of tickLabels(); track tick.t) {
      <text [attr.x]="tick.x" [attr.y]="viewHeight - 6" class="tick" text-anchor="middle">
        {{ tick.label }}
      </text>
    }

    <polygon [attr.points]="fillPoints()" class="fill" />
    <polyline [attr.points]="curvePoints()" class="curve" />

    @for (handle of handleKeys(); track handle) {
      @let pos = handlePos(handle);
      <circle
        [attr.cx]="pos.x"
        [attr.cy]="pos.y"
        r="8"
        class="handle"
        [class.handle-plateau]="handle === 'plateauLeft' || handle === 'plateauRight'"
        (pointerdown)="onPointerDown(handle, $event)"
      />
    }
  </svg>
  <p class="chart-hint">{{ axisCaption() }}</p>
  <p class="chart-hint chart-hint-sub">
    Obere Griffe: links/rechts horizontal und vertikal. Untere Griffe: Breite des Abfalls.
  </p>
</div>
